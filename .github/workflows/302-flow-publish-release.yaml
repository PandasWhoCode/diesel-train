# SPDX-License-Identifier: Apache-2.0
name: '302: [FLOW] Publish Release'
on:
  workflow_dispatch:
    inputs:
      dry-run-enabled:
        description: 'Dry-Run Enabled'
        type: boolean
        default: true
  push:
    branches:
      - main

defaults:
  run:
    shell: bash

permissions:
  contents: write
  id-token: write
  packages: write
  pull-requests: write
  issues: write

jobs:
  prepare-release:
    name: Prepare Workflow Run
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set-outputs.outputs.version }}
      need-release: ${{ steps.set-outputs.outputs.need-release }}
    steps:
      - name: Prepare Release
        uses: pandaswhocode/initialize-github-job@ffb7446339e8e6007b942312ac95457d1a20b6cf # 1.0.4
        with:
          checkout: 'true'
          checkout-ref: '${{ github.ref }}'
          checkout-token: '${{ secrets.GH_ACCESS_TOKEN }}'
          setup-node: 'true'
          node-version: '24'
          node-registry: 'https://registry.npmjs.org/'

      - name: Install Semantic Release
        run: |
          npm install -g semantic-release@25.0.2 @semantic-release/git@10.0.1 @semantic-release/github@12.0.2 @semantic-release/exec@7.1.0 gradle-semantic-release-plugin@1.7.6
          npm install -g conventional-changelog-conventionalcommits@9.1.0 @commitlint/cli@18.6.0 @commitlint/config-conventional@18.6.0
          npm install -g marked-mangle@1.1.6 marked-gfm-heading-id@3.1.2 semantic-release-conventional-commits@3.0.0

      - name: Calculate Next Version (default branch)
        id: calculate-version
        env:
          GITHUB_TOKEN: ${{ secrets.GH_ACCESS_TOKEN }}
          GIT_AUTHOR_NAME: ${{ secrets.GIT_USER_NAME }}
          GIT_AUTHOR_EMAIL: ${{ secrets.GIT_USER_EMAIL }}
          GIT_COMMITTER_NAME: ${{ secrets.GIT_USER_NAME }}
          GIT_COMMITTER_EMAIL: ${{ secrets.GIT_USER_EMAIL }}
        run: |
          PROCEED="true"
          if [[ "${{ github.event.repository.default_branch }}" == "${{ github.ref_name }}" ]]; then
            if SEMREL_OUTPUT=$(npx semantic-release --dry-run 2>&1); then
              # Show Semantic Release dry run output
              echo "::group::Semantic Release Dry Run Output"
                echo "${SEMREL_OUTPUT}"
              echo "::endgroup::"

              # Check if Semantic Release detected a new version
              if echo "${SEMREL_OUTPUT}" | grep -q "The next release version is"; then
                echo "::notice file=302-flow-publish-release.yaml::Semantic Release detected a new version"
                NEXT_VER=$(echo "${SEMREL_OUTPUT}" | grep -oP '(?<=The next release version is )[0-9]+\.[0-9]+\.[0-9]+' | head -1)
                echo "${NEXT_VER}" > VERSION
              else
                echo "::notice file=302-flow-publish-release.yaml::Semantic Release detected NO new version"
                PROCEED="false"
              fi
            else
              echo "::notice file=302-flow-publish-release.yaml::Semantic Release did NOT run successfully"
              PROCEED="false"
            fi
          else
            if [[ "${{ inputs.dry-run-enabled }}" == "true" ]]; then
              LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//' || echo "0.0.0")
              echo "${LATEST_TAG}" > VERSION
              PROCEED="true"
            else
              PROCEED="false"
            fi
          fi

          echo "need-release=${PROCEED}" >> "${GITHUB_OUTPUT}"

      - name: Extract Version
        id: set-outputs
        if: ${{ !cancelled() && always() }}
        run: |
          PROCEED="false"
          OUTVER=""
          if [[ -f VERSION ]]; then
            TRIMMED_VERSION=$(cat VERSION | tr -d '[:space:]')
            OUTVER="${TRIMMED_VERSION}"
            PROCEED="true"
            echo "version=${TRIMMED_VERSION}"
          fi

          echo "version=${OUTVER}" >> "${GITHUB_OUTPUT}"
          echo "need-release=${PROCEED}" >> "${GITHUB_OUTPUT}"

  create-github-release:
    name: 'Create GitHub Release'
    runs-on: ubuntu-latest
    if: ${{ needs.prepare-release.outputs.need-release == 'true' }}
    needs:
      - prepare-release
    steps:
      - name: Prepare Job
        uses: pandaswhocode/initialize-github-job@ffb7446339e8e6007b942312ac95457d1a20b6cf # 1.0.4
        with:
          checkout: 'true'
          checkout-ref: '${{ github.ref }}'
          checkout-token: '${{ secrets.GH_ACCESS_TOKEN }}'
          setup-node: 'true'
          node-version: '24'
          node-registry: 'https://registry.npmjs.org/'
          setup-go: 'true'
          go-version: '1.25'

      - name: Install GnuPG Tools
        run: |
          if ! command -v gpg2 >/dev/null 2>&1; then
          echo "::group::Configure APT Mirror"
           # Configure APT to use main Ubuntu archive (disable mirror rotation)
           sudo sed -i 's|http://[a-z.]*.ubuntu.com|http://archive.ubuntu.com|g' /etc/apt/sources.list
          echo "::endgroup::"
          echo "::group::Updating APT Repository Indices"
           sudo apt update
          echo "::endgroup::"
          echo "::group::Installing GnuPG Tools"
           sudo apt install -y gnupg2
          echo "::endgroup::"
          fi

      - name: Import GPG key
        id: gpg_key
        uses: crazy-max/ghaction-import-gpg@e89d40939c28e39f97cf32126055eeae86ba74ec # v6.3.0
        with:
          gpg_private_key: ${{ secrets.GPG_KEY_CONTENTS }}
          passphrase: ${{ secrets.GPG_KEY_PASSPHRASE }}
          git_config_global: true
          git_user_signingkey: true
          git_commit_gpgsign: true
          git_tag_gpgsign: false

      - name: Install Task
        run: go install github.com/go-task/task/v3/cmd/task@v3.49.1

      - name: Build
        run: task build

      - name: Install Semantic Release
        run: |
          npm install -g semantic-release@25.0.2 @semantic-release/git@10.0.1 @semantic-release/github@12.0.2 @semantic-release/exec@7.1.0 gradle-semantic-release-plugin@1.7.6
          npm install -g conventional-changelog-conventionalcommits@9.1.0 @commitlint/cli@18.6.0 @commitlint/config-conventional@18.6.0
          npm install -g marked-mangle@1.1.6 marked-gfm-heading-id@3.1.2 semantic-release-conventional-commits@3.0.0

      - name: Publish Semantic Release
        env:
          GH_TOKEN: ${{ secrets.GH_ACCESS_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GH_ACCESS_TOKEN }}
          GIT_AUTHOR_NAME: ${{ secrets.GIT_USER_NAME }}
          GIT_AUTHOR_EMAIL: ${{ secrets.GIT_USER_EMAIL }}
          GIT_COMMITTER_NAME: ${{ secrets.GIT_USER_NAME }}
          GIT_COMMITTER_EMAIL: ${{ secrets.GIT_USER_EMAIL }}
        if: ${{ !cancelled() && !failure() }}
        run: |
          FLAGS=""
          if [[ "${{ inputs.dry-run-enabled }}" == "true" ]]; then
            FLAGS="--dry-run"
          fi

          npx semantic-release ${FLAGS}

  publish-docker:
    name: Publish Docker Image to GHCR
    runs-on: ubuntu-latest
    needs:
      - prepare-release
      - create-github-release
    if: ${{ needs.prepare-release.outputs.need-release == 'true' }}
    steps:
      - name: Prepare Job
        uses: pandaswhocode/initialize-github-job@ffb7446339e8e6007b942312ac95457d1a20b6cf # 1.0.4
        with:
          checkout: 'true'
          checkout-ref: '${{ github.ref }}'
          checkout-token: '${{ secrets.GITHUB_TOKEN }}'
          checkout-fetch-depth: '1'

      - name: Log in to GHCR
        if: ${{ inputs.dry-run-enabled != true }}
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          VERSION="${{ needs.prepare-release.outputs.version }}"
          IMAGE="ghcr.io/pandaswhocode/diesel-train"

          if [[ "${{ inputs.dry-run-enabled }}" == "true" ]]; then
            echo "Dry-run enabled - building image without push"
            docker build -t "${IMAGE}:${VERSION}" .
          else
            docker build \
              -t "${IMAGE}:${VERSION}" \
              -t "${IMAGE}:latest" \
              .
            docker push "${IMAGE}:${VERSION}"
            docker push "${IMAGE}:latest"
          fi

  publish-brew-formula:
    name: Publish Brew Formula
    runs-on: ubuntu-latest
    needs:
      - prepare-release
      - create-github-release
    if: ${{ needs.prepare-release.outputs.need-release == 'true' }}
    steps:
      - name: Prepare Job
        uses: pandaswhocode/initialize-github-job@ffb7446339e8e6007b942312ac95457d1a20b6cf # 1.0.4
        with:
          checkout: 'true'
          checkout-ref: '${{ github.ref }}'
          checkout-token: '${{ secrets.GITHUB_TOKEN }}'
          checkout-fetch-depth: '1'

      - name: Check out homebrew-tools tap
        if: ${{ inputs.dry-run-enabled != true }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: PandasWhoCode/homebrew-tools
          token: ${{ secrets.HOMEBREW_TAP_PAT }}
          path: homebrew-tools

      - name: Publish Brew Formula
        run: |
          if [[ "${{ inputs.dry-run-enabled }}" == "true" ]]; then
            echo "Dry-run enabled - skipping brew formula publish"
          else
            echo "Publishing brew formula..."
            cp .github/workflows/support/formula.rb homebrew-tools/Formula/dl.rb
            VERSION="${{ needs.prepare-release.outputs.version }}"
            TARBALL_URL="https://github.com/PandasWhoCode/diesel-train/archive/refs/tags/v${VERSION}.tar.gz"
            SHA256=$(curl -sL "${TARBALL_URL}" | sha256sum | awk '{print $1}')
            sed -i "s/SUB_VERSION/${VERSION}/g" homebrew-tools/Formula/dl.rb
            sed -i "s/SUB_SHA256/${SHA256}/g" homebrew-tools/Formula/dl.rb
          fi

      - name: Push Homebrew formula update
        if: ${{ inputs.dry-run-enabled != true }}
        env:
          TAG: ${{ needs.prepare-release.outputs.version }}
        run: |
          cd homebrew-tools
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/dl.rb
          git commit -m "chore(release): update dl formula for ${TAG} [skip ci]"
          git push origin HEAD:main
